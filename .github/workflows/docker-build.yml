name: Build & Push Docker Images (cms + frontend)

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_BASENAME: ${{ github.repository }}

jobs:
    detect-changes:
        runs-on: ubuntu-latest
        outputs:
            cms: ${{ steps.filter.outputs.cms }}
            frontend: ${{ steps.filter.outputs.frontend }}
        steps:
            - uses: actions/checkout@v6

            - name: Path filter
              id: filter
              uses: dorny/paths-filter@v4
              with:
                  filters: |
                      cms:
                        - 'packages/cms/**'
                        - 'yarn.lock'
                        - 'package.json'
                        - '.yarnrc.yml'
                        - '.yarn/**'
                      frontend:
                        - 'packages/frontend/**'
                        - 'yarn.lock'
                        - 'package.json'
                        - '.yarnrc.yml'
                        - '.yarn/**'

    build-cms:
        needs: detect-changes
        if: needs.detect-changes.outputs.cms == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: docker/setup-qemu-action@v3
            - uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata (cms)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}-cms
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha

            - name: Build & push (cms)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: packages/cms/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}-cms:buildcache
                  cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}-cms:buildcache,mode=max

    build-frontend:
        needs: detect-changes
        if: needs.detect-changes.outputs.frontend == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: docker/setup-qemu-action@v3
            - uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata (frontend)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}-frontend
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha

            - name: Build & push (frontend)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: packages/frontend/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}-frontend:buildcache
                  cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}-frontend:buildcache,mode=max
